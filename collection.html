<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mes Archives Gallica</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; }

    body {
      background: #0f0f1e;
      color: #ccc;
      font-family: Georgia, serif;
      margin: 0;
    }

    /* ---- STATS ---- */
    .stats-block {
      background: #16162a;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      margin: 16px 20px;
      padding: 16px 20px;
    }

    .stats-title {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats-title span {
      font-size: 12px;
      color: #888;
      font-weight: normal;
    }

    .stats-title span b { color: #d4af37; }

    .rarity-bars {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .rarity-bar {
      flex: 1;
      min-width: 90px;
      background: #0f0f1e;
      border: 1px solid #2a2a4e;
      border-radius: 4px;
      padding: 8px 10px;
    }

    .rarity-bar .rb-label {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .rarity-bar .rb-count {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .rarity-bar .rb-bar {
      height: 3px;
      background: #2a2a4e;
      border-radius: 2px;
      overflow: hidden;
    }

    .rarity-bar .rb-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .5s ease;
    }

    /* ---- FILTRES ---- */
    .controls {
      margin: 0 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sort-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .sort-label {
      font-size: 11px;
      color: #888;
      letter-spacing: 1px;
      margin-right: 4px;
    }

    .sort-btn {
      padding: 5px 14px;
      border: 1px solid #2a2a4e;
      background: transparent;
      color: #888;
      border-radius: 3px;
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .15s;
    }

    .sort-btn:hover { color: #d4af37; border-color: #d4af37; }
    .sort-btn.active { background: #d4af37; color: #1a1a2e; border-color: #d4af37; font-weight: bold; }

    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-row input,
    .search-row select {
      background: #0f0f1e;
      border: 1px solid #2a2a4e;
      color: #ccc;
      padding: 8px 12px;
      border-radius: 3px;
      font-family: Georgia, serif;
      font-size: 12px;
      flex: 1;
      min-width: 160px;
    }

    .search-row input:focus,
    .search-row select:focus {
      outline: none;
      border-color: #d4af3766;
    }

    .search-row input::placeholder { color: #444; }

    .filter-only {
      padding: 5px 12px;
      border: 1px solid #2a2a4e;
      background: transparent;
      color: #888;
      border-radius: 3px;
      font-family: Georgia, serif;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-only.active { background: #d4af3722; color: #d4af37; border-color: #d4af37; }
    .filter-only:hover { border-color: #d4af37; color: #d4af37; }

    /* ---- TABLEAU ---- */
    .table-wrap {
      margin: 0 20px 40px;
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 60px 90px 1fr 120px 100px 50px;
      background: #0a0a18;
      padding: 10px 14px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #555;
      border-bottom: 1px solid #2a2a4e;
    }

    .table-row {
      display: grid;
      grid-template-columns: 60px 90px 1fr 120px 100px 50px;
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a2e;
      align-items: center;
      cursor: pointer;
      transition: background .12s;
    }

    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: #1a1a2e; }

    /* Rareté */
    .badge-rarity {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* Vignette */
    .thumb-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .thumb-wrap img {
      width: 50px;
      height: 64px;
      object-fit: cover;
      border-radius: 2px;
      border: 1px solid #2a2a4e;
      background: #111;
      flex-shrink: 0;
    }

    /* Titre + badges */
    .title-cell { padding-right: 12px; }

    .doc-title {
      font-size: 13px;
      color: #ddd;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .doc-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      background: #1e1e3a;
      color: #888;
      border: 1px solid #2a2a4e;
      white-space: nowrap;
    }

    .badge-theme { color: #7a9fd4; border-color: #2a4a7a; }
    .badge-type  { color: #9d7a2a; border-color: #4a3a1a; }

    /* Date */
    .date-cell { font-size: 12px; color: #888; }

    /* ARK */
    .ark-cell { font-size: 9px; color: #444; font-family: monospace; }

    /* Compteur */
    .cnt-cell { font-size: 11px; color: #555; text-align: right; }

    /* Vide */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: #555;
    }
    .empty-state a { color: #d4af37; text-decoration: none; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
      padding: 0 20px 16px;
      font-size: 12px;
      color: #888;
    }

    .pagination button {
      background: transparent;
      border: 1px solid #2a2a4e;
      color: #888;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: Georgia, serif;
    }

    .pagination button:hover:not(:disabled) { border-color: #d4af37; color: #d4af37; }
    .pagination button:disabled { opacity: .3; cursor: default; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Exploration</a>
    <a href="collection.html" class="active">Archives</a>
  </nav>

  <!-- STATS -->
  <div class="stats-block">
    <div class="stats-title">
      <span>Collection Stats</span>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span>Documents uniques : <b id="statUnique">0</b> &nbsp;|&nbsp; Total tirages : <b id="statTotal">0</b></span>
        <button onclick="exportCollection()" style="
          padding:4px 12px;background:transparent;
          border:1px solid #d4af3766;color:#d4af37;
          border-radius:3px;font-family:Georgia;font-size:11px;
          cursor:pointer;letter-spacing:1px;">↓ Exporter</button>
        <label style="
          padding:4px 12px;background:transparent;
          border:1px solid #44446688;color:#888;
          border-radius:3px;font-family:Georgia;font-size:11px;
          cursor:pointer;letter-spacing:1px;">↑ Importer
          <input type="file" id="importFile" accept=".json"
                 style="display:none" onchange="importCollection(event)">
        </label>
      </div>
    </div>
    <div class="rarity-bars" id="rarityBars"></div>
  </div>

  <!-- CONTRÔLES -->
  <div class="controls">
    <div class="sort-buttons">
      <span class="sort-label">Trier par</span>
      <button class="sort-btn active" data-sort="recent">RÉCENT</button>
      <button class="sort-btn" data-sort="date_asc">DATE ↑</button>
      <button class="sort-btn" data-sort="date_desc">DATE ↓</button>
      <button class="sort-btn" data-sort="title">TITRE</button>
      <button class="sort-btn" data-sort="rarity">RARETÉ</button>
    </div>
    <div class="search-row">
      <input type="text" id="searchTitle" placeholder="Rechercher par titre...">
      <select id="filterEpoque">
        <option value="">Toutes les époques</option>
        <option value="medieval">Moyen Âge (avant 1500)</option>
        <option value="renaissance">Renaissance (1500–1600)</option>
        <option value="xviie">XVIIe siècle</option>
        <option value="xviiie">XVIIIe siècle</option>
        <option value="xixe">XIXe siècle</option>
        <option value="xxe">XXe siècle</option>
        <option value="unknown">Date inconnue</option>
      </select>
      <select id="filterType">
        <option value="">Tous les types</option>
        <option value="image">🖼️ Images</option>
        <option value="fascicule">📰 Presse</option>
        <option value="manuscrit">📜 Manuscrits</option>
        <option value="carte">🗺️ Cartes</option>
        <option value="affiche">🎨 Affiches</option>
      </select>
      <select id="filterTheme">
        <option value="">Tous les thèmes</option>
      </select>
      <button class="filter-only" id="btnReset">✕ Réinitialiser</button>
    </div>
  </div>

  <!-- TABLEAU -->
  <div class="table-wrap">
    <div class="table-head">
      <div>RARETÉ</div>
      <div>APERÇU</div>
      <div>TITRE</div>
      <div>THÈME</div>
      <div>DATE</div>
      <div style="text-align:right">CNT</div>
    </div>
    <div id="collectionList"></div>
  </div>

  <!-- PAGINATION -->
  <div class="pagination">
    <button id="btnPrev">←</button>
    <span id="pageInfo">Page 1 / 1</span>
    <button id="btnNext">→</button>
  </div>

  <script src="script.js"></script>
  <script>
    // STORAGE_KEY est défini dans script.js — ne pas redéclarer ici
    const PAGE_SIZE = 20;

    let currentPage = 1;
    let currentSort = "recent";

    const RARITIES = [
      { label: "LÉGENDAIRE", short: "LR", color: "#c8a200" },
      { label: "ÉPIQUE",     short: "UR", color: "#9932cc" },
      { label: "RARE",       short: "SR", color: "#2768c4" },
      { label: "PEU COMMUN", short: "R",  color: "#2a9d4e" },
      { label: "COMMUN",     short: "C",  color: "#888888" },
    ];

    const TYPE_LABELS = {
      photo: "📷 Photo", journal: "📰 Journal", fascicule: "📰 Presse",
      carte: "🗺️ Carte", affiche: "🖼️ Affiche", dessin: "✏️ Dessin",
      manuscrit: "📜 Manuscrit", revue: "📖 Revue", image: "🖼️ Image",
      "image fixe": "🖼️ Image", document: "📄 Document", estampe: "🎨 Estampe",
    };

    function getEpoque(year) {
      if (!year) return "unknown";
      const y = parseInt(year);
      if (y < 1500) return "medieval";
      if (y < 1600) return "renaissance";
      if (y < 1700) return "xviie";
      if (y < 1800) return "xviiie";
      if (y < 1900) return "xixe";
      return "xxe";
    }

    function getTypeCategory(docType) {
      if (!docType) return "image";
      const t = docType.toLowerCase();
      if (t.includes("manuscrit")) return "manuscrit";
      if (t.includes("carte")) return "carte";
      if (t.includes("fascicule") || t.includes("journal") || t.includes("revue")) return "fascicule";
      if (t.includes("affiche") || t.includes("estampe") || t.includes("dessin")) return "affiche";
      return "image";
    }

    function rarityFromLabel(label) {
      return RARITIES.find(r => r.label === label) || RARITIES[4];
    }

    function renderStats(coll) {
      document.getElementById('statUnique').textContent = coll.length;
      document.getElementById('statTotal').textContent  = coll.length;

      const counts = {};
      RARITIES.forEach(r => counts[r.label] = 0);
      coll.forEach(c => { if (c.rarity) counts[c.rarity] = (counts[c.rarity] || 0) + 1; });

      document.getElementById('rarityBars').innerHTML = RARITIES.map(r => {
        const n = counts[r.label] || 0;
        const pct = coll.length ? Math.round(n / coll.length * 100) : 0;
        return `
          <div class="rarity-bar">
            <div class="rb-label" style="color:${r.color}">${r.short}</div>
            <div class="rb-count">${n} / ${coll.length}</div>
            <div class="rb-bar"><div class="rb-fill" style="width:${pct}%;background:${r.color}"></div></div>
          </div>`;
      }).join('');
    }

    function renderCollection() {
      const coll = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

      // Remplir thèmes
      const themes = [...new Set(coll.map(c => c.theme).filter(Boolean))].sort();
      const themeSelect = document.getElementById('filterTheme');
      const prevTheme = themeSelect.value;
      themeSelect.innerHTML = '<option value="">Tous les thèmes</option>' +
        themes.map(t => `<option value="${t}"${t===prevTheme?' selected':''}>${t}</option>`).join('');

      renderStats(coll);

      // Filtres
      const search = document.getElementById('searchTitle').value.toLowerCase();
      const epoque = document.getElementById('filterEpoque').value;
      const type   = document.getElementById('filterType').value;
      const theme  = document.getElementById('filterTheme').value;

      let filtered = coll.filter(card => {
        const title = (card.title || card.name || '').toLowerCase();
        if (search && !title.includes(search)) return false;
        if (epoque && getEpoque(card.year) !== epoque) return false;
        if (type   && getTypeCategory(card.docType) !== type) return false;
        if (theme  && card.theme !== theme) return false;
        return true;
      });

      // Tri
      const rarityOrder = { "LÉGENDAIRE":0,"ÉPIQUE":1,"RARE":2,"PEU COMMUN":3,"COMMUN":4 };
      filtered.sort((a, b) => {
        if (currentSort === "date_asc")  return (parseInt(a.year)||9999) - (parseInt(b.year)||9999);
        if (currentSort === "date_desc") return (parseInt(b.year)||0)    - (parseInt(a.year)||0);
        if (currentSort === "title")     return (a.title||a.name||'').localeCompare(b.title||b.name||'','fr');
        if (currentSort === "rarity")    return (rarityOrder[a.rarity]||4) - (rarityOrder[b.rarity]||4);
        return 0; // recent = ordre naturel
      });

      // Pagination
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PAGE_SIZE;
      const page  = filtered.slice(start, start + PAGE_SIZE);

      document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
      document.getElementById('btnPrev').disabled = currentPage <= 1;
      document.getElementById('btnNext').disabled = currentPage >= totalPages;

      const list = document.getElementById('collectionList');

      if (coll.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <p style="font-size:36px">📜</p>
          <p>Votre collection est vide.</p>
          <p><a href="index.html">Commencer l'exploration →</a></p>
        </div>`;
        return;
      }

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><p>Aucun document ne correspond à ces filtres.</p></div>`;
        return;
      }

      list.innerHTML = page.map((card, i) => {
        const img      = card.img || card.imgUrl || '';
        const url      = card.url || card.itemUrl || '#';
        const title    = card.title || card.name || 'Document';
        const year     = card.year || '—';
        const typeStr  = TYPE_LABELS[card.docType] || "📄 Document";
        const rarity   = rarityFromLabel(card.rarity);
        const arkShort = card.arkId ? `#${card.arkId.substring(0,10)}` : '';
        const theme    = card.theme || '';
        const idx      = (currentPage - 1) * PAGE_SIZE + i;

        return `
          <div class="table-row" onclick="showCardModal(${idx})" title="Voir la carte">
            <div class="badge-rarity" style="color:${rarity.color}">${rarity.short}</div>
            <div class="thumb-wrap">
              <img src="${img}" onerror="this.onerror=null;this.style.opacity='.3';" alt="${title}">
            </div>
            <div class="title-cell">
              <div class="doc-title">${title}</div>
              <div class="doc-badges">
                <span class="badge badge-type">${typeStr}</span>
                <span class="badge" style="font-size:9px;color:#444">${arkShort}</span>
              </div>
            </div>
            <div class="date-cell">
              ${theme ? `<span class="badge badge-theme">${theme}</span>` : '—'}
            </div>
            <div class="date-cell">${year}</div>
            <div class="cnt-cell">x1</div>
          </div>`;
      }).join('');
    }

    // ---- MODALE CARTE depuis la collection ----
    function showCardModal(idx) {
      const coll = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      const card = coll[idx];
      if (!card) return;

      const rarityObj = rarityFromLabel(card.rarity);
      const img       = card.img || card.imgUrl || '';
      const imgFb     = card.coverUrl || img;
      const url       = card.url || card.itemUrl || '#';
      const title     = card.title || card.name || 'Document';
      const year      = card.dateLabel || card.year || 'Date inconnue';
      const typeStr   = TYPE_LABELS[card.docType] || "📄 Document";
      const isShiny   = rarityObj.label !== "COMMUN";

      document.querySelector('.col-overlay')?.remove();

      const div = document.createElement('div');
      div.className = 'col-overlay';
      div.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.88);
        display:flex;align-items:center;justify-content:center;
        z-index:9999;font-family:'Georgia',serif;animation:cfadeIn .3s ease;`;

      div.innerHTML = `
        <style>
          @keyframes cfadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
          @keyframes cShimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
          @keyframes cGlow{0%,100%{box-shadow:0 0 30px ${rarityObj.color}66}50%{box-shadow:0 0 60px ${rarityObj.color}aa}}
          @keyframes cShine{0%{background-position:-200% center}100%{background-position:200% center}}
          @keyframes cBlink{0%,100%{opacity:.4}50%{opacity:1}}
          .cg {
            background:#faf6ee;width:min(420px,92vw);border-radius:8px;overflow:hidden;
            border:3px solid ${rarityObj.color};
            ${isShiny ? 'animation:cGlow 2s ease-in-out infinite;' : `box-shadow:0 0 30px ${rarityObj.color}44;`}
          }
          .cg-head {
            background:#1a1a2e;padding:14px 16px 12px;
            border-bottom:2px solid ${rarityObj.color};text-align:center;
          }
          .cg-rlabel {
            font-size:22px;font-weight:bold;letter-spacing:4px;color:${rarityObj.color};
            ${isShiny ? `background:linear-gradient(90deg,${rarityObj.color} 0%,#fff 40%,${rarityObj.color} 60%,${rarityObj.color} 100%);
              background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
              background-clip:text;animation:cShine 2.5s linear infinite;` : ''}
          }
          .cg-rsub{font-size:11px;color:${rarityObj.color}99;letter-spacing:3px;margin-top:3px;}
          .cg-imgwrap{
            width:min(340px,80vw);height:min(420px,52vh);margin:0 auto;
            position:relative;border:2px solid ${rarityObj.color};
            ${isShiny ? `box-shadow:0 0 20px ${rarityObj.color}66;` : ''}
            background:#0a0a18;overflow:hidden;
          }
          .cg-ph{
            position:absolute;inset:0;
            background:linear-gradient(90deg,#0f0f1e 20%,#1e1e3e 50%,#0f0f1e 80%);
            background-size:600px 100%;animation:cShimmer 1.6s ease-in-out infinite;
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
          }
          .cg-ph-icon{font-size:40px;opacity:.25;}
          .cg-ph-txt{font-size:10px;letter-spacing:3px;color:${rarityObj.color}88;}
          .cg-ph-dots{font-size:18px;color:${rarityObj.color}66;animation:cBlink 1.2s ease-in-out infinite;letter-spacing:4px;}
          .cg-imgwrap img{
            position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
            display:block;cursor:pointer;opacity:0;transition:opacity .5s ease;
          }
          .cg-imgwrap img.loaded{opacity:1;}
          .cg-imgwrap img.loaded~.cg-ph{display:none;}
          .cg-imgwrap img:hover{opacity:.85!important;}
          .cg-hint{color:#d4af37;font-size:10px;margin-top:8px;letter-spacing:1px;opacity:.6;}
          .cg-body{padding:14px 16px 4px;text-align:center;}
          .cg-title{font-size:15px;font-weight:bold;color:#1a1a2e;margin:0 0 6px;line-height:1.4;}
          .cg-meta{font-size:11px;color:#666;margin:3px 0;}
          .cg-footer{margin:12px 0 0;background:#1a1a2e;padding:16px;text-align:center;cursor:pointer;}
          .cg-footer p{color:#d4af37;font-size:13px;font-weight:bold;letter-spacing:2px;margin:0;}
          .cg-footer span{display:block;color:#888;font-size:10px;letter-spacing:1px;margin-top:4px;}
        </style>
        <div class="cg">
          <div class="cg-head">
            <div class="cg-rlabel">${rarityObj.label}</div>
            <div class="cg-rsub">${rarityObj.short} · BIBLIOTHÈQUE NATIONALE DE FRANCE</div>
          </div>
          <div style="background:#1a1a2e;padding:16px;text-align:center;">
            <div class="cg-imgwrap">
              <img src="${img}" alt="${title}"
                   onerror="this.src='${imgFb}';this.onerror=null;this.classList.add('loaded');"
                   onload="this.classList.add('loaded');"
                   onclick="window.open('${url}','_blank')"
                   title="Voir sur Gallica">
              <div class="cg-ph">
                <div class="cg-ph-icon">📜</div>
                <div class="cg-ph-txt">Consultation des archives</div>
                <div class="cg-ph-dots">· · ·</div>
              </div>
            </div>
            <p class="cg-hint">↑ cliquer pour voir sur Gallica</p>
          </div>
          <div class="cg-body">
            <p class="cg-title">${title}</p>
            <p class="cg-meta">${typeStr} · ${year}</p>
            <p class="cg-meta" style="font-size:9px;color:#bbb;">ark:/12148/${card.arkId}</p>
          </div>
          <div class="cg-footer" id="cg-close">
            <p>FERMER</p>
            <span>cliquer pour fermer</span>
          </div>
        </div>`;

      document.body.appendChild(div);
      div.addEventListener('click', e => { if (e.target === div) div.remove(); });
      document.getElementById('cg-close').addEventListener('click', () => div.remove());
    }
    window.showCardModal = showCardModal;

    // ---- EVENTS ----
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        currentPage = 1;
        renderCollection();
      });
    });

    ['searchTitle','filterEpoque','filterType','filterTheme'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        currentPage = 1;
        renderCollection();
      });
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      document.getElementById('searchTitle').value  = '';
      document.getElementById('filterEpoque').value = '';
      document.getElementById('filterType').value   = '';
      document.getElementById('filterTheme').value  = '';
      currentSort = 'recent';
      currentPage = 1;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-sort="recent"]').classList.add('active');
      renderCollection();
    });

    document.getElementById('btnPrev').addEventListener('click', () => { currentPage--; renderCollection(); });
    document.getElementById('btnNext').addEventListener('click', () => { currentPage++; renderCollection(); });

    // ---- EXPORT ----
    function exportCollection() {
      const coll = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      if (coll.length === 0) { alert("Votre collection est vide !"); return; }
      const json = JSON.stringify(coll, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `gallicagacha_collection_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    window.exportCollection = exportCollection;

    // ---- IMPORT ----
    function importCollection(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) throw new Error("Format invalide");

          const existing = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

          // Fusionner sans doublons (par arkId + page)
          const existingKeys = new Set(existing.map(c => `${c.arkId}_${c.page}`));
          const newCards = imported.filter(c => !existingKeys.has(`${c.arkId}_${c.page}`));
          const merged = [...newCards, ...existing].slice(0, 500);

          localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
          renderCollection();

          // Confirmation
          const msg = document.createElement('div');
          msg.style.cssText = `position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
            background:#2a9d4e;color:#fff;padding:11px 22px;border-radius:4px;
            font-family:Georgia;font-size:13px;z-index:9999;`;
          msg.textContent = `✦ ${newCards.length} nouvelle${newCards.length>1?'s':''} carte${newCards.length>1?'s':''} importée${newCards.length>1?'s':''} !`;
          document.body.appendChild(msg);
          setTimeout(() => msg.remove(), 3000);

        } catch(err) {
          alert("Fichier invalide. Assurez-vous d'importer un fichier .json exporté depuis GallicaGacha.");
        }
        // Réinitialiser l'input pour permettre un re-import du même fichier
        event.target.value = '';
      };
      reader.readAsText(file);
    }
    window.importCollection = importCollection;

    renderCollection();
  </script>
</body>
</html>
